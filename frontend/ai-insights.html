<!-- frontend/ai-insights.html -->
<div class="bg-white rounded-lg shadow p-6 mt-4">
    <h3 class="text-lg font-semibold mb-4 flex items-center">
        <i class="fas fa-robot text-blue-600 mr-2"></i>
        AI Analysis Insights
    </h3>
    
    <!-- Priority Score -->
    <div class="mb-6">
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-medium text-gray-700">Priority Score</span>
            <span class="text-2xl font-bold" id="priorityScore">0</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div class="bg-blue-600 rounded-full h-3" id="priorityBar" style="width: 0%"></div>
        </div>
    </div>
    
    <!-- Confidence Score -->
    <div class="mb-4">
        <div class="flex justify-between items-center">
            <span class="text-sm text-gray-600">Analysis Confidence</span>
            <span class="text-sm font-medium" id="confidenceScore">0%</span>
        </div>
    </div>
    
    <!-- Key Metrics Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-gray-50 p-3 rounded-lg">
            <div class="text-xs text-gray-500 mb-1">Urgency</div>
            <div class="flex items-center">
                <span class="w-2 h-2 rounded-full mr-2" id="urgencyDot"></span>
                <span class="font-medium" id="urgencyLevel">-</span>
            </div>
        </div>
        
        <div class="bg-gray-50 p-3 rounded-lg">
            <div class="text-xs text-gray-500 mb-1">Medical Risk</div>
            <div class="flex items-center">
                <span class="w-2 h-2 rounded-full mr-2" id="medicalDot"></span>
                <span class="font-medium" id="medicalLevel">-</span>
            </div>
        </div>
        
        <div class="bg-gray-50 p-3 rounded-lg">
            <div class="text-xs text-gray-500 mb-1">Children</div>
            <div class="font-medium" id="childrenStatus">-</div>
        </div>
        
        <div class="bg-gray-50 p-3 rounded-lg">
            <div class="text-xs text-gray-500 mb-1">Category</div>
            <div class="font-medium" id="detectedCategory">-</div>
        </div>
    </div>
    
    <!-- Detailed Factors -->
    <div class="border-t pt-4">
        <h4 class="text-sm font-medium text-gray-700 mb-3">Key Factors</h4>
        <div id="factorsList" class="space-y-2">
            <!-- Dynamically populated -->
        </div>
    </div>
    
    <!-- Insights -->
    <div class="border-t pt-4 mt-4">
        <h4 class="text-sm font-medium text-gray-700 mb-3">AI Insights</h4>
        <div id="insightsList" class="space-y-2">
            <!-- Dynamically populated -->
        </div>
    </div>
</div>

<script>
async function loadAIAnalysis(caseId) {
    try {
        const token = localStorage.getItem('token');
        const response = await fetch(`http://127.0.0.1:5001/api/cases/${caseId}/ai-insights`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        if (response.ok) {
            const analysis = await response.json();
            displayAIAnalysis(analysis);
        }
    } catch (error) {
        console.error('Error loading AI analysis:', error);
    }
}

function displayAIAnalysis(analysis) {
    // Priority Score
    document.getElementById('priorityScore').textContent = 
        Math.round(analysis.priority_score);
    document.getElementById('priorityBar').style.width = 
        `${analysis.priority_score}%`;
    
    // Confidence
    document.getElementById('confidenceScore').textContent = 
        `${Math.round(analysis.confidence_scores.overall * 100)}%`;
    
    // Urgency
    const urgency = analysis.urgency;
    document.getElementById('urgencyLevel').textContent = 
        urgency.level.toUpperCase();
    const urgencyDot = document.getElementById('urgencyDot');
    urgencyDot.className = `w-2 h-2 rounded-full mr-2 bg-${getUrgencyColor(urgency.level)}-500`;
    
    // Medical Risk
    const medical = analysis.medical_risk;
    document.getElementById('medicalLevel').textContent = 
        medical.level.toUpperCase();
    const medicalDot = document.getElementById('medicalDot');
    medicalDot.className = `w-2 h-2 rounded-full mr-2 bg-${getMedicalColor(medical.level)}-500`;
    
    // Children
    document.getElementById('childrenStatus').textContent = 
        analysis.children.present ? 'Yes' : 'No';
    if (analysis.children.count) {
        document.getElementById('childrenStatus').textContent += 
            ` (${analysis.children.count})`;
    }
    
    // Category
    document.getElementById('detectedCategory').textContent = 
        analysis.category.category.replace('_', ' ').toUpperCase();
    
    // Factors
    const factorsList = document.getElementById('factorsList');
    factorsList.innerHTML = '';
    
    if (analysis.urgency.factors) {
        analysis.urgency.factors.forEach(factor => {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center text-sm';
            div.innerHTML = `
                <span class="text-gray-600">${factor.factor || factor}</span>
                <span class="font-medium">${factor.contribution ? 
                    Math.round(factor.contribution * 100) + '%' : ''}</span>
            `;
            factorsList.appendChild(div);
        });
    }
    
    // Insights
    const insightsList = document.getElementById('insightsList');
    insightsList.innerHTML = '';
    
    if (analysis.insights) {
        analysis.insights.forEach(insight => {
            const div = document.createElement('div');
            div.className = 'flex items-start space-x-2 text-sm p-2 bg-blue-50 rounded';
            div.innerHTML = `
                <i class="fas fa-lightbulb text-blue-600 mt-1"></i>
                <div>
                    <p class="text-gray-800">${insight.description}</p>
                    <p class="text-xs text-gray-500">Confidence: ${Math.round(insight.confidence * 100)}%</p>
                </div>
            `;
            insightsList.appendChild(div);
        });
    }
}

function getUrgencyColor(level) {
    const colors = {
        'low': 'green',
        'medium': 'yellow',
        'high': 'orange',
        'critical': 'red'
    };
    return colors[level.toLowerCase()] || 'gray';
}

function getMedicalColor(level) {
    const colors = {
        'low': 'green',
        'medium': 'yellow',
        'high': 'orange',
        'critical': 'red'
    };
    return colors[level.toLowerCase()] || 'gray';
}
</script>
