<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisal – Dashboard</title>
    <!-- Use Tailwind via CDN (ok for development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar-item {
            transition: all 0.3s;
        }
        .sidebar-item:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .sidebar-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .priority-critical { background-color: #ef4444; color: white; }
        .priority-high { background-color: #f97316; color: white; }
        .priority-medium { background-color: #eab308; color: white; }
        .priority-low { background-color: #22c55e; color: white; }
        .status-pending { background-color: #eab308; color: white; }
        .status-approved { background-color: #22c55e; color: white; }
        .status-rejected { background-color: #ef4444; color: white; }
        .status-more-info { background-color: #3b82f6; color: white; }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .document-card {
            transition: all 0.3s;
        }
        .document-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg flex flex-col" style="min-height:100vh;">
            <!-- Logo -->
            <div class="gradient-bg p-5 text-white" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
                <div class="flex items-center space-x-3 mb-3">
                    <div style="background:rgba(255,255,255,0.2);padding:10px;border-radius:12px;">
                        <i class="fas fa-hand-holding-heart text-white" style="font-size:22px;"></i>
                    </div>
                    <div>
                        <span class="font-bold text-lg" id="brandName">Wisal</span>
                        <p class="text-xs" style="opacity:0.75;">Donation Platform</p>
                    </div>
                </div>
            </div>

            <!-- User Info -->
            <div class="p-4 border-b">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center text-white font-bold" id="userInitials">
                        U
                    </div>
                    <div>
                        <p class="font-medium text-gray-800" id="userName">Loading...</p>
                        <p class="text-xs text-gray-500" id="userRole">Loading...</p>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 overflow-y-auto" id="sidebarNav">
                <!-- Dynamic menu will be inserted here -->
            </nav>

            <!-- Logout Button -->
            <div class="p-4 border-t">
                <button id="logoutBtn" class="flex items-center space-x-3 text-gray-600 hover:text-red-600 w-full p-2 rounded-lg sidebar-item">
                    <i class="fas fa-sign-out-alt w-5"></i>
                    <span id="logoutText">Sign Out</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Hero Banner -->
            <div style="background: linear-gradient(135deg,rgba(102,126,234,0.93) 0%,rgba(118,75,162,0.93) 100%), url('https://images.unsplash.com/photo-1532629345422-7515f3d16bb6?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; padding: 28px 32px 52px; color: white;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                    <div>
                        <h1 style="font-size:26px;font-weight:800;margin:0 0 4px;" id="pageTitle">Dashboard</h1>
                        <p style="opacity:0.78;margin:0;font-size:14px;" id="bannerWelcome">Welcome back &mdash; <span id="bannerUserName" style="font-weight:600;"></span></p>
                    </div>
                    <div style="display:flex;gap:10px;align-items:center;">
                        <button onclick="toggleDashLang()" id="dashLangBtn"
                            style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.35);font-size:13px;font-weight:700;color:white;background:rgba(255,255,255,0.15);cursor:pointer;backdrop-filter:blur(6px);">
                            <i class="fas fa-globe"></i>
                            <span id="dashLangBtnText">العربية</span>
                        </button>
                        <button id="actionButton" class="hidden" style="align-items:center;gap:6px;padding:8px 18px;border-radius:10px;background:white;color:#7c3aed;font-size:13px;font-weight:700;border:none;cursor:pointer;">
                            <i class="fas fa-plus"></i><span id="newCaseBtnText">New Case</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-8" style="margin-top:-24px;">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="statsContainer">
                    <!-- Dynamic stats -->
                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="hidden flex justify-center items-center py-12">
                    <div class="loading-spinner"></div>
                </div>

                <!-- Content Area -->
                <div id="contentArea" class="bg-white rounded-lg shadow p-6">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <!-- User Edit Modal -->
    <div id="userEditModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-md w-full">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="m_editUserTitle">Edit User</h2>
                    <button onclick="closeUserEditModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <form id="userEditForm">
                    <input type="hidden" name="user_id" id="editUserId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_editUserNameLbl">Full Name</label>
                            <input type="text" name="full_name" id="editFullName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_editUserEmailLbl">Email</label>
                            <input type="email" name="email" id="editEmail" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_editUserRoleLbl">Role</label>
                            <select name="role" id="editRole" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="donor" id="m_roleOpt_donor">Donor</option>
                                <option value="beneficiary" id="m_roleOpt_beneficiary">Beneficiary</option>
                                <option value="charity" id="m_roleOpt_charity">Charity</option>
                                <option value="admin" id="m_roleOpt_admin">Admin</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_editUserStatusLbl">Status</label>
                            <select name="is_active" id="editStatus" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="true" id="m_statusOpt_active">Active</option>
                                <option value="false" id="m_statusOpt_inactive">Inactive</option>
                            </select>
                        </div>
                        <div class="flex justify-end space-x-3 pt-4">
                            <button type="button" onclick="closeUserEditModal()"
                                class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50" id="m_editUserCancelBtn">
                                Cancel
                            </button>
                            <button type="submit"
                                class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90" id="m_editUserSubmitBtn">
                                Update User
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Case Creation Modal (for beneficiaries) -->
    <div id="caseModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="m_caseTitle">Create New Help Case</h2>
                    <button onclick="closeCaseModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <form id="caseForm">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseTitleLbl">Title</label>
                            <input type="text" name="title" id="caseFormTitle" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Brief title for your case">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseDescLbl">Description</label>
                            <textarea name="description" id="caseFormDesc" rows="4" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Describe your situation in detail..."></textarea>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseAmountLbl">Amount Needed (ريال)</label>
                                <input type="number" name="amount_needed" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseCatLbl">Category</label>
                                <select name="category" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="medical" id="m_cat_medical">Medical</option>
                                    <option value="rent" id="m_cat_rent">Rent/Housing</option>
                                    <option value="education" id="m_cat_education">Education</option>
                                    <option value="food" id="m_cat_food">Food</option>
                                    <option value="utilities" id="m_cat_utilities">Utilities</option>
                                    <option value="clothing" id="m_cat_clothing">Clothing</option>
                                    <option value="other" id="m_cat_other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseIncomeLbl">Monthly Income (ريال)</label>
                                <input type="number" name="income"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseFamilyLbl">Family Size</label>
                                <input type="number" name="family_size"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_caseChildrenLbl">Number of Children</label>
                            <input type="number" name="children_count"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <div class="flex justify-end space-x-3 pt-4">
                            <button type="button" onclick="closeCaseModal()"
                                class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50" id="m_caseCancelBtn">
                                Cancel
                            </button>
                            <button type="submit"
                                class="gradient-bg text-white px-6 py-2 rounded-lg hover:opacity-90" id="m_caseSubmitBtn">
                                Submit Case
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Case Details Modal -->
    <div id="caseDetailsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="caseDetailTitle">Case Details</h2>
                    <button onclick="closeCaseDetailsModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div id="caseDetailContent" class="space-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <!-- Donation Modal -->
    <div id="donationModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-md w-full">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="m_donTitle">Make a Donation</h2>
                    <button onclick="closeDonationModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <form id="donationForm">
                    <input type="hidden" name="case_id" id="donationCaseId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_donAmountLbl">Amount (ريال)</label>
                            <input type="number" name="amount" id="donAmountInput" required min="1" step="0.01"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Enter amount">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2" id="m_donMethodLbl">Payment Method</label>
                            <select name="payment_method" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="card" id="m_pay_card">Credit/Debit Card</option>
                                <option value="paypal" id="m_pay_paypal">PayPal</option>
                                <option value="bank" id="m_pay_bank">Bank Transfer</option>
                            </select>
                        </div>
                        <button type="submit" id="m_donSubmitBtn"
                            class="w-full gradient-bg text-white py-2 px-4 rounded-lg hover:opacity-90">
                            Complete Donation
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Document Viewer Modal -->
    <div id="documentViewerModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold" id="documentViewerTitle">Document Viewer</h2>
                <button onclick="closeDocumentViewer()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-4 h-[70vh] overflow-auto">
                <iframe id="documentViewerFrame" class="w-full h-full border-0" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <!-- Case Documents Modal -->
    <div id="caseDocumentsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold" id="caseDocumentsTitle">Case Documents</h2>
                    <button onclick="closeCaseDocumentsModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div id="caseDocumentsList" class="space-y-4">
                    <!-- Documents will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) {
            window.location.href = 'index.html';
        }

        // Get role from URL or user object
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || user.role;

        const dashboardUrl = `${window.location.origin}/dashboard.html${role ? `?role=${encodeURIComponent(role)}` : ''}`;
        localStorage.setItem('wisalDashboardUrl', dashboardUrl);

        // Update user info
        document.getElementById('userName').textContent = user.name || 'User';
        document.getElementById('userRole').textContent = role ? role.charAt(0).toUpperCase() + role.slice(1) : 'User';
        document.getElementById('userInitials').textContent = 
            (user.name ? user.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : 'U');
        const bannerEl = document.getElementById('bannerUserName');
        if (bannerEl) bannerEl.textContent = user.name || 'User';

        // API Base URL
        const API_BASE = 'http://127.0.0.1:5001';

        // Helper function for authenticated fetch
        async function authenticatedFetch(url, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            
            const response = await fetch(url, {
                ...options,
                headers: headers
            });
            
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
                throw new Error('Session expired');
            }
            
            return response;
        }

        // Role-based menu items
        const menuItems = {
            donor: [
                { icon: 'fa-home', text: 'Dashboard', action: 'dashboard' },
                { icon: 'fa-heart', text: 'Browse Cases', action: 'browse-cases' },
                { icon: 'fa-star', text: 'My Favorites', action: 'favorites' },
                { icon: 'fa-history', text: 'Donation History', action: 'donations' },
                { icon: 'fa-user-circle', text: 'My Profile', page: 'CSS/profile.html' }
            ],
            beneficiary: [
                { icon: 'fa-home', text: 'Dashboard', action: 'dashboard' },
                { icon: 'fa-file-alt', text: 'My Cases', action: 'my-cases' },
                { icon: 'fa-plus-circle', text: 'New Case', action: 'new-case' },
                { icon: 'fa-upload', text: 'Upload Documents', page: 'documents-upload.html' },
                { icon: 'fa-user-circle', text: 'My Profile', page: 'CSS/profile.html' }
            ],
            admin: [
                { icon: 'fa-home', text: 'Dashboard', action: 'dashboard' },
                { icon: 'fa-users', text: 'Manage Users', action: 'users' },
                { icon: 'fa-folder-open', text: 'Pending Cases', action: 'pending-cases' },
                { icon: 'fa-check-circle', text: 'Approved Cases', action: 'approved-cases' },
                { icon: 'fa-chart-bar', text: 'Analytics', action: 'analytics' },
                { icon: 'fa-user-circle', text: 'My Profile', page: 'CSS/profile.html' }
            ],
            charity: [
                { icon: 'fa-home', text: 'Dashboard', action: 'dashboard' },
                { icon: 'fa-file-alt', text: 'My Cases', action: 'my-cases' },
                { icon: 'fa-user-circle', text: 'My Profile', page: 'CSS/profile.html' }
            ]
        };

        // Render sidebar menu
        const sidebarNav = document.getElementById('sidebarNav');
        sidebarNav.innerHTML = '';

        if (menuItems[role]) {
            menuItems[role].forEach(item => {
                const button = document.createElement('button');
                button.className = 'sidebar-item w-full flex items-center space-x-3 p-3 rounded-lg text-gray-700 mb-1 hover:bg-gray-100';
                button.innerHTML = `
                    <i class="fas ${item.icon} w-5"></i>
                    <span class="flex-1 text-left">${item.text}</span>
                `;
                
                if (item.page) {
                    button.onclick = () => {
                        window.location.href = item.page;
                    };
                } else {
                    button.onclick = () => loadContent(item.action);
                }
                
                sidebarNav.appendChild(button);
            });
        }

        // Show/hide action button based on role
        const actionButton = document.getElementById('actionButton');
        if (role === 'beneficiary') {
            actionButton.classList.remove('hidden');
            actionButton.onclick = () => {
                openCaseModal();
            };
        }

        // Modal functions
        function openCaseModal() {
            document.getElementById('caseModal').classList.remove('hidden');
            document.getElementById('caseModal').classList.add('flex');
        }

        function closeCaseModal() {
            document.getElementById('caseModal').classList.add('hidden');
            document.getElementById('caseModal').classList.remove('flex');
        }

        function openCaseDetailsModal() {
            document.getElementById('caseDetailsModal').classList.remove('hidden');
            document.getElementById('caseDetailsModal').classList.add('flex');
        }

        function closeCaseDetailsModal() {
            document.getElementById('caseDetailsModal').classList.add('hidden');
            document.getElementById('caseDetailsModal').classList.remove('flex');
        }

        function openDonationModal(caseId, event) {
            if (event) event.stopPropagation();
            document.getElementById('donationCaseId').value = caseId;
            document.getElementById('donationModal').classList.remove('hidden');
            document.getElementById('donationModal').classList.add('flex');
        }

        function closeDonationModal() {
            document.getElementById('donationModal').classList.add('hidden');
            document.getElementById('donationModal').classList.remove('flex');
        }

        function openUserEditModal(userId, fullName, email, role, isActive) {
            document.getElementById('editUserId').value = userId;
            document.getElementById('editFullName').value = fullName;
            document.getElementById('editEmail').value = email;
            document.getElementById('editRole').value = role;
            document.getElementById('editStatus').value = isActive.toString();
            document.getElementById('userEditModal').classList.remove('hidden');
            document.getElementById('userEditModal').classList.add('flex');
        }

        function closeUserEditModal() {
            document.getElementById('userEditModal').classList.add('hidden');
            document.getElementById('userEditModal').classList.remove('flex');
        }

        // Document Viewer Functions
        function openDocumentViewer(title, url) {
            document.getElementById('documentViewerTitle').textContent = title;
            document.getElementById('documentViewerFrame').src = url;
            document.getElementById('documentViewerModal').classList.remove('hidden');
            document.getElementById('documentViewerModal').classList.add('flex');
        }

        function closeDocumentViewer() {
            document.getElementById('documentViewerModal').classList.add('hidden');
            document.getElementById('documentViewerModal').classList.remove('flex');

        // View document with proper authentication
        async function viewDocument(docId, filename) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('Please login first');
                    return;
                }

                const response = await fetch(`${API_BASE}/api/documents/${docId}/view`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to load document');
                }

                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const fileExt = filename.split('.').pop().toLowerCase();
                
                if (fileExt === 'pdf' || ['jpg', 'jpeg', 'png'].includes(fileExt)) {
                    openDocumentViewer(filename, blobUrl);
                } else {
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => window.URL.revokeObjectURL(blobUrl), 100);
                }
            } catch (error) {
                console.error('Error viewing document:', error);
                alert('Error viewing document: ' + error.message);
            }
        }

async function verifyDocument(docId, verified) {
    if (!confirm(`Are you sure you want to ${verified ? 'approve' : 'reject'} this document?`)) return;
    
    try {

        console.log('Verifying document:', docId, 'with action:', verified);
        
        const response = await fetch(`${API_BASE}/api/documents/${docId}/verify`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ verified: verified })
        });
        
        console.log('Verify response status:', response.status);
        
        if (response.ok) {
            const result = await response.json();
            alert(result.message || `Document ${verified ? 'approved' : 'rejected'} successfully`);
            
            // Refresh the current view
            const modalContent = document.getElementById('caseDocumentsList');
            if (modalContent) {
                // Get case ID from modal title
                const titleText = document.getElementById('caseDocumentsTitle').textContent;
                const match = titleText.match(/Documents? -?\s*(.+)/);
                if (match && match[1]) {
                    // Find the case ID from the documents list
                    const caseId = window.currentCaseId;
                    if (caseId) {
                        loadCaseDocuments(caseId);
                    }
                }
            }
        } else {
            const error = await response.json();
            console.error('Verify error:', error);
            alert(error.error || 'Error verifying document');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('An error occurred: ' + error.message);
    }
}

async function submitInfoRequest(caseId) {
    const notes = document.getElementById('requestNotes').value;
    const selectedDocs = [];
    document.querySelectorAll('#requestInfoModal input[type="checkbox"]:checked').forEach(cb => {
        selectedDocs.push(cb.value);
    });
    
    if (!notes && selectedDocs.length === 0) {
        alert('Please provide notes or select documents to request');
        return;
    }
    
    const requestData = {
        action: 'more_info',
        notes: notes + (selectedDocs.length > 0 ? '\nRequired Documents: ' + selectedDocs.join(', ') : '')
    };
    
    try {
        const response = await authenticatedFetch(`${API_BASE}/api/admin/cases/${caseId}/review`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        });
        
        if (response.ok) {
            alert('Information request sent successfully');
            closeRequestModal();
            loadPendingCases();
        } else {
            const error = await response.json();
            alert(error.error || 'Error sending request');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('An error occurred');
    }
}
function closeRequestModal() {
    document.getElementById('requestInfoModal').classList.add('hidden');
    document.getElementById('requestInfoModal').classList.remove('flex');
    document.getElementById('requestNotes').value = '';
    document.querySelectorAll('#requestInfoModal input[type="checkbox"]').forEach(cb => cb.checked = false);
}

            formData.forEach((value, key) => { data[key] = value; });
            
            if (data.amount_needed) data.amount_needed = parseFloat(data.amount_needed);
            if (data.income) data.income = parseFloat(data.income);

            try {
                const response = await authenticatedFetch(`${API_BASE}/api/cases`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)

                if (response.ok) {
                    alert('Case created successfully! It will be reviewed by admin.');
                    closeCaseModal();
                    e.target.reset();
                    loadContent('my-cases');

                if (text.includes(searchTerm)) {

        function T(k) { return (dashTranslations[dashLang] && dashTranslations[dashLang].dyn && dashTranslations[dashLang].dyn[k]) || k; }

        function applyDashLang(lang) {
            dashLang = lang;
            const d = dashTranslations[lang];
            document.documentElement.dir = d.dir;
            document.documentElement.lang = d.lang;
            document.body.style.fontFamily = d.font;

            const ids = ['brandName','dashLangBtnText','logoutText','newCaseBtnText'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = d[id];
            });

            // Translate modals
            if (d.modals) {
                const m = d.modals;
                const mIds = {
                    'm_editUserTitle': m.editUserTitle, 'm_editUserNameLbl': m.editUserNameLbl,
                    'm_editUserEmailLbl': m.editUserEmailLbl, 'm_editUserRoleLbl': m.editUserRoleLbl,
                    'm_editUserStatusLbl': m.editUserStatusLbl, 'm_editUserCancelBtn': m.editUserCancelBtn,
                    'm_editUserSubmitBtn': m.editUserSubmitBtn,
                    'm_roleOpt_donor': m.roleOpt_donor, 'm_roleOpt_beneficiary': m.roleOpt_beneficiary,
                    'm_roleOpt_charity': m.roleOpt_charity, 'm_roleOpt_admin': m.roleOpt_admin,
                    'm_statusOpt_active': m.statusOpt_active, 'm_statusOpt_inactive': m.statusOpt_inactive,
                    'm_caseTitle': m.caseTitle, 'm_caseTitleLbl': m.caseTitleLbl,
                    'm_caseDescLbl': m.caseDescLbl, 'm_caseAmountLbl': m.caseAmountLbl,
                    'm_caseCatLbl': m.caseCatLbl, 'm_caseIncomeLbl': m.caseIncomeLbl,
                    'm_caseFamilyLbl': m.caseFamilyLbl, 'm_caseChildrenLbl': m.caseChildrenLbl,
                    'm_caseCancelBtn': m.caseCancelBtn, 'm_caseSubmitBtn': m.caseSubmitBtn,
                    'm_cat_medical': m.cat_medical, 'm_cat_rent': m.cat_rent,
                    'm_cat_education': m.cat_education, 'm_cat_food': m.cat_food,
                    'm_cat_utilities': m.cat_utilities, 'm_cat_clothing': m.cat_clothing, 'm_cat_other': m.cat_other,
                    'm_donTitle': m.donTitle, 'm_donAmountLbl': m.donAmountLbl,
                    'm_donMethodLbl': m.donMethodLbl, 'm_donSubmitBtn': m.donSubmitBtn,
                    'm_pay_card': m.pay_card, 'm_pay_paypal': m.pay_paypal, 'm_pay_bank': m.pay_bank
                };
                Object.entries(mIds).forEach(([id, text]) => {
                    const el = document.getElementById(id); if (el) el.textContent = text;
                });
                // Update placeholders
                const titleInp = document.getElementById('caseFormTitle');
                const descInp = document.getElementById('caseFormDesc');
                const donInp = document.getElementById('donAmountInput');
                if (titleInp) titleInp.placeholder = m.caseTitlePh;
                if (descInp) descInp.placeholder = m.caseDescPh;
                if (donInp) donInp.placeholder = m.donAmountPh;
            }

            // Update page title if on dashboard
            const pt = document.getElementById('pageTitle');
            if (pt && (pt.textContent === 'لوحة التحكم' || pt.textContent === 'Dashboard')) {
                pt.textContent = d.pageTitle;
            }

            // Update welcome banner
            const bw = document.getElementById('bannerWelcome');
            if (bw) {
                const uname = document.getElementById('bannerUserName')?.textContent || '';
                bw.innerHTML = `${d.dyn.welcomeBack} &mdash; <span id="bannerUserName" style="font-weight:600;">${uname}</span>`;
            }

            // Re-render sidebar menu with translated items
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                const role = user.role;
                const sidebarNav = document.getElementById('sidebarNav');
                if (sidebarNav && d.menuItems[role]) {
                    sidebarNav.innerHTML = '';
                    d.menuItems[role].forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'sidebar-item w-full flex items-center space-x-3 p-3 rounded-lg text-gray-700 mb-1 hover:bg-gray-100';
                        btn.innerHTML = `<i class="fas ${item.icon} w-5"></i><span class="flex-1 text-${lang === 'ar' ? 'right' : 'left'}">${item.text}</span>`;
                        if (item.page) {
                            btn.onclick = () => window.location.href = item.page;
                        } else {
                            btn.onclick = () => loadContent(item.action);
                        }
                        sidebarNav.appendChild(btn);
                    });
                }
            }

            localStorage.setItem('wisalLang', lang);
        }

        // Track current content action for re-rendering on language switch
        let currentAction = 'dashboard';
        const origLoadContent = loadContent;
        loadContent = async function(action) {
            currentAction = action;
            return origLoadContent(action);
        };

        function toggleDashLang() {
            applyDashLang(dashLang === 'ar' ? 'en' : 'ar');
            // Re-render current content with new language
            if (currentAction) loadContent(currentAction);
        }

        // Apply saved language first, then load the initial dashboard content.
        setTimeout(async () => {
            applyDashLang(dashLang);
            await loadContent('dashboard');
        }, 100);
    </script>
